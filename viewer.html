<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mapa de Ruta</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    #panel {
      position: absolute;
      top: 10px; left: 10px;
      background: white;
      padding: 10px;
      z-index: 5;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="panel">
  <strong>Ruta:</strong> <span id="ruta"></span>
</div>

<div id="map"></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const bk = urlParams.get("bk");

  document.getElementById("ruta").textContent = bk;

  let map;
  let markers = [];
  let polyline = null;
  let currentIndex = 0;

  const COLOR_VISITED = "#8b8b8b";
  const COLOR_CURRENT = "#FFD700";
  const COLOR_PENDING = "#FF0000";

  // ==== SIDEBAR ====
  const sidebar = document.createElement("div");
  sidebar.style.position = "absolute";
  sidebar.style.top = "60px";
  sidebar.style.left = "10px";
  sidebar.style.width = "260px";
  sidebar.style.maxHeight = "80vh";
  sidebar.style.overflowY = "auto";
  sidebar.style.background = "white";
  sidebar.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.2)";
  sidebar.style.padding = "10px";
  sidebar.style.borderRadius = "8px";
  sidebar.innerHTML = `<h3>Ruta: ${bk}</h3><div id="routeList"></div>`;
  document.body.appendChild(sidebar);

  // ==== NAVIGATION BUTTONS ====
  const navButtons = document.createElement("div");
  navButtons.style.position = "absolute";
  navButtons.style.bottom = "40px";
  navButtons.style.left = "50%";
  navButtons.style.transform = "translateX(-50%)";
  navButtons.style.display = "flex";
  navButtons.style.gap = "15px";

  navButtons.innerHTML = `
    <button id="prevPoint" style="padding:10px 20px; font-size:16px;">⬅ Anterior</button>
    <button id="nextPoint" style="padding:10px 20px; font-size:16px;">Siguiente ➡</button>
  `;
  document.body.appendChild(navButtons);

  // DARK MODE BUTTON
  const darkModeBtn = document.createElement("button");
  darkModeBtn.innerHTML = "🌙 Modo Oscuro";
  darkModeBtn.style.position = "absolute";
  darkModeBtn.style.top = "10px";
  darkModeBtn.style.right = "10px";
  darkModeBtn.style.padding = "10px 15px";
  darkModeBtn.style.background = "black";
  darkModeBtn.style.color = "white";
  darkModeBtn.style.border = "none";
  darkModeBtn.style.borderRadius = "6px";
  darkModeBtn.style.cursor = "pointer";
  document.body.appendChild(darkModeBtn);

  let darkMode = false;

  darkModeBtn.onclick = () => {
    darkMode = !darkMode;
    map.setOptions({ styles: darkMode ? darkMapStyle : null });
  };

  const darkMapStyle = [
    { elementType: "geometry", stylers: [{ color: "#212121" }] },
    { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
    {
      featureType: "road",
      elementType: "geometry",
      stylers: [{ color: "#383838" }]
    }
  ];

  async function initMap() {
    document.getElementById("map").style.height = "100vh";

    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 14,
      center: { lat: -9.05, lng: -78.59 },
      mapTypeControl: false
    });

    // === LOAD GEOJSON ===
    const geojsonResponse = await fetch(`${bk}.geojson`);
    const geojson = await geojsonResponse.json();

    const routeList = document.getElementById("routeList");
    let path = [];

    geojson.features.forEach((feature) => {
      const seq = feature.properties.seq;
      const cliente = feature.properties.cliente || "Sin nombre";

      const [lng, lat] = feature.geometry.coordinates;

      const marker = new google.maps.Marker({
        position: { lat, lng },
        map,
        label: `${seq}`,
        title: cliente,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: COLOR_PENDING,
          fillOpacity: 1,
          strokeWeight: 1,
          strokeColor: "white"
        }
      });

      const infowindow = new google.maps.InfoWindow({
        content: `<b>${seq}. ${cliente}</b>`
      });

      marker.addListener("click", () => {
        infowindow.open({ anchor: marker, map });
        focusPoint(seq - 1);
      });

      markers.push(marker);
      path.push({ lat, lng });

      const item = document.createElement("div");
      item.style.padding = "6px 0";
      item.style.cursor = "pointer";
      item.innerHTML = `${seq}. ${cliente}`;
      item.onclick = () => focusPoint(seq - 1);
      routeList.appendChild(item);
    });

    polyline = new google.maps.Polyline({
      path: path,
      geodesic: true,
      strokeColor: "#0066FF",
      strokeOpacity: 1,
      strokeWeight: 4
    });

    polyline.setMap(map);

    focusPoint(0);

    document.getElementById("nextPoint").onclick = () => {
      if (currentIndex < markers.length - 1) focusPoint(currentIndex + 1);
    };
    document.getElementById("prevPoint").onclick = () => {
      if (currentIndex > 0) focusPoint(currentIndex - 1);
    };
  }

  function updateMarkerColors() {
    markers.forEach((marker, index) => {
      let color =
        index < currentIndex
          ? COLOR_VISITED
          : index === currentIndex
          ? COLOR_CURRENT
          : COLOR_PENDING;

      marker.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: index === currentIndex ? 12 : 8,
        fillColor: color,
        fillOpacity: 1,
        strokeWeight: 1,
        strokeColor: "white"
      });
    });
  }

  function focusPoint(index) {
    currentIndex = index;
    const m = markers[index];

    map.panTo(m.getPosition());
    updateMarkerColors();
  }

  window.initMap = initMap;
</script>

<!-- Replace API KEY HERE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDoQCoq3gLrA1wc3arISscvdYyt__-e-gE&callback=initMap" async defer></script>

</body>
</html>
