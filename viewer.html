<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mapa de Ruta</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    #panel {
      position: absolute;
      top: 10px; left: 10px;
      background: white;
      padding: 10px;
      z-index: 5;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="panel">
  <strong>Ruta:</strong> <span id="ruta"></span>
</div>

<div id="map"></div>

<script>
  async function initMap() {
    // 1. Get BK from URL parameters (?bk=BK4802)
    const params = new URLSearchParams(window.location.search);
    const bk = params.get("bk");  // example: BK4802
    document.getElementById("ruta").innerText = bk;

    // 2. Initialize map
    const map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: -9.06, lng: -78.59 },
      zoom: 13,
    });

    // 3. Load the GeoJSON
    const res = await fetch(`${bk}.geojson`);
    const geojson = await res.json();

    const bounds = new google.maps.LatLngBounds();

    geojson.features.forEach(f => {
      const [lng, lat] = f.geometry.coordinates;
      const { seq, cliente } = f.properties;

      const marker = new google.maps.Marker({
        position: { lat, lng },
        map,
        label: String(seq),
      });

      const infowindow = new google.maps.InfoWindow({
        content: `<strong>${seq}. ${cliente}</strong>`
      });

      marker.addListener("click", () => infowindow.open(map, marker));

      bounds.extend(marker.getPosition());
    });

    map.fitBounds(bounds);
  }
</script>

<!-- Replace API KEY HERE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDoQCoq3gLrA1wc3arISscvdYyt__-e-gE&callback=initMap" async defer></script>

</body>
</html>
